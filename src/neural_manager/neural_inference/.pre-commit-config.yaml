# Pre-commit hooks for neural_pos_ctrl TDD workflow
#
# Install with:
#   pip install pre-commit
#   pre-commit install
#
# Run manually:
#   pre-commit run --all-files

# General Python hooks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
    - id: trailing-whitespace
      exclude: \.md$
    - id: end-of-file-fixer
      exclude: \.md$
    - id: check-yaml
      args: ['--unsafe']  # Allow custom YAML tags like ${oc.env:...}
    - id: check-added-large-files
      args: ['--maxkb=1000']
    - id: check-merge-conflict
    - id: check-case-conflict
    - id: check-symlinks
    - id: detect-private-key
    - id: mixed-line-ending
      args: ['--fix=lf']

# Python linting with ruff
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.1.9
  hooks:
    - id: ruff
      args: [--fix, --exit-non-zero-on-fix]
      types_or: [python, pyi, jupyter]

# Type checking with mypy (optional, comment out if not using)
# - repo: https://github.com/pre-commit/mirrors-mypy
#   rev: v1.8.0
#   hooks:
#     - id: mypy
#       additional_dependencies:
#         - types-requests
#       args: [--ignore-missing-imports, --warn-unused-ignores]

# TDD Enforcement - Run unit tests before commit
- repo: local
  hooks:
    - id: pytest-unit
      name: pytest (unit tests - fast)
      entry: ./run_tests --unit --no-gpu -x
      language: system
      pass_filenames: false
      always_run: true

    - id: pytest-quick
      name: pytest (quick smoke test)
      entry: ./run_tests --unit -m "not slow and not gpu" --maxfail=3
      language: system
      pass_filenames: false
      always_run: true

    - id: check-test-coverage
      name: pytest (coverage check)
      entry: ./run_tests --unit --cov --cov-fail-under=70
      language: system
      pass_filenames: false
      always_run: false

# Documentation checks
- repo: https://github.com/pre-commit/pygrep-hooks
  rev: v1.10.0
  hooks:
    - id: python-check-blanket-noqa
    - id: python-check-blanket-type-ignore
    - id: python-no-eval
    - id: python-use-type-annotations

# Security checks
- repo: https://github.com/PyCQA/bandit
  rev: 1.7.6
  hooks:
    - id: bandit
      args: ['-c', 'pyproject.toml']
      additional_dependencies: ['bandit[toml]']
      exclude: ^tests/
