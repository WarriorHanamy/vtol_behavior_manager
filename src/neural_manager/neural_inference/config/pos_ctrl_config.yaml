# Neural Position Control Configuration

node:
  name: "neural_pos_ctrl_node"
  setpoint_topic: "/neural/control"
  odometry_topic: "/fmu/out/vehicle_odometry"
  target_topic: "/neural/target"

model:
  task: "vtol_hover"
  actor_type: "mlp"
  hidden_dim: 64
  num_layers: 1
  tensorrt:
    enabled: true
    engine_path: "${oc.env:INFER_WORKSPACE}/src/neural_manager/neural_pos_ctrl/models/policy_no_thrdyn.trt"
    auto_build: false
    max_batch_size: 1
    fp16: true
    int8: false
  inference:
    backends: ["tensorrt", "onnx_cuda", "onnx_cpu"]
    providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
    validate_shapes: true
    output_clipping:
      enabled: true
      min: -1.0
      max: 1.0

control:
  update_rate: 100.0
  update_period: 0.01
  timeout_ms: 50.0
  control_mode: "acc_rates"
  max_acc: 19.62
  max_roll_pitch_rate: 3.0
  max_yaw_rate: 1.0
  action_processing:
    use_tanh_activation: true
    enable_action_clipping: false

safety:
  enable_failure_detection: true
  auto_stop_on_timeout: true

debug:
  enabled: false
  verbose_logging: false
  measure_inference_time: true
  print_observation: true
  print_control: true
  acc_fixed: false
