# Neural Position Control Configuration
# All parameters controlled by this single YAML file

# Node configuration
node:
  name: "neural_pos_ctrl_node"
  setpoint_topic: "/neural/control"
  odometry_topic: "/fmu/out/vehicle_odometry"

# Model configuration
model:
  path: "${oc.env:INFER_WORKSPACE}/src/neural_manager/neural_pos_ctrl/models/policy_no_thrdyn.onnx"

  # Executor type: "gru" or "mlp"
  actor_type: "mlp"

  # History buffer configuration (only used when actor_type="mlp")
  history:
    enabled: false  # Disabled: using single observation directly
    length: 5  # Number of observations to stack
    obs_dim: 20  # Dimension of single observation

  # GRU specific parameters (only used when executor_type="gru")
  hidden_dim: 64
  num_layers: 1

  # Expected input/output shapes for validation
  expected_shapes:
    gru:
      input: [1, 20]  # Single observation
      output: [1, 5]
    mlp:
      input: [1, 20]  # Single observation (no history stacking)
      output: [1, 4]

  # TensorRT settings (optional, for accelerated inference)
  tensorrt:
    enabled: true  # Enable TensorRT acceleration if engine is available
    engine_path: "${oc.env:INFER_WORKSPACE}/src/neural_manager/neural_pos_ctrl/models/policy_no_thrdyn.trt"
    auto_build: false  # Automatically build engine from ONNX if not found
    max_batch_size: 1
    fp16: true  # Enable FP16 precision for faster inference
    int8: false  # Enable INT8 precision (requires calibration)

  # Inference backend configuration
  inference:
    # Backend priority: try in order, fall back to next if unavailable
    # Available backends: "tensorrt", "onnx_cuda", "onnx_cpu"
    backends: ["tensorrt", "onnx_cuda", "onnx_cpu"]

    # ONNX runtime providers (used when onnx_cuda or onnx_cpu backend is selected)
    providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
    validate_shapes: true
    output_clipping:
      enabled: true
      min: -1.0
      max: 1.0

# Control system
control:
  # Timing
  update_rate: 100.0 # Hz
  update_period: 0.01 # seconds
  timeout_ms: 50.0

  # Control mode selection:
  # 'throttle_rates': Throttle + body rates (VehicleRatesSetpoint) - recommended for multicopters
  # 'acc_rates': Thrust acceleration + body rates (VehicleThrustAccSetpoint) - alternative mode
  # control_mode: "throttle_rates"
  control_mode: "acc_rates"

  # Action mapping
  max_acc: 19.62 # m/s^2 (maximum acceleration, default 2*g, only used in acc_rates mode)
  max_roll_pitch_rate: 3.0 # rad/s
  max_yaw_rate: 1.0 # rad/s

  # Action processing (matching training environment)
  action_processing:
    use_tanh_activation: true  # Apply tanh to map raw MLP output to [-1, 1]
    enable_action_clipping: false  # Deprecated: use tanh instead for smooth gradients

  # Input limits
  input_saturation:
    enabled: true
    linear_velocity: [-5.0, 5.0] # m/s
    angular_velocity: [-10, 10] # rad/s
    target_position: [-5.0, 5.0] # m
    actions: [-1.0, 1.0] # normalized (only used if clipping enabled)

target:
  position: [0.0, 0.0, -3.0] # NED coordinates [North, East, Down] meters
  yaw: 1.57 # radians

# Safety limits
safety:
  enable_failure_detection: true
  auto_stop_on_timeout: true

# Debug settings
debug:
  enabled: false
  verbose_logging: false
  measure_inference_time: true
  print_observation: true
  print_control: true
  acc_fixed: false
