# Neural Position Control Configuration

node:
  name: "neural_pos_ctrl_node"
  setpoint_topic: "/neural/control"
  odometry_topic: "/fmu/out/vehicle_odometry"
  target_topic: "/neural/target"

model:
  task: "vtol_hover"
  inference:
    backend: "onnx"
    providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
    engine_path: ""

control:
  timeout_ms: 50.0
  control_mode: "acc_rates"
  min_thrust_g: 0.0
  max_thrust_g: 2.0
  max_ang_vel: [3.0, 3.0, 1.0]
  action_processing:
    use_tanh_activation: false
    enable_action_clipping: true


debug:
  enabled: false
  verbose_logging: false
  measure_inference_time: true
  print_observation: true
  print_control: true
  acc_fixed: false
  log_interval: 1
  enable_features: true
  features_log_file: /tmp/neural_features.log
