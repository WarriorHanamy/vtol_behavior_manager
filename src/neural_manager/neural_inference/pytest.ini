[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower)
    performance: Performance tests
    gpu: Tests requiring GPU/CUDA
    tensorrt: Tests requiring TensorRT
    onnx: Tests using ONNX Runtime
    ros2: Tests requiring ROS2 environment

# Coverage options (only used when --cov is specified)
# Add with: pip install pytest-cov
