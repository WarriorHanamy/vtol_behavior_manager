# Isaac Position Control Neural Network Parameters
# 该配置文件包含所有运行时参数

# 模型配置
model:
  # ONNX模型文件路径 (相对于包share目录)
  onnx_path: "models/policy.onnx"

  # 模型输入输出信息
  input_shape: [1, 16]  # 批次大小 x 观测维度
  output_shape: [1, 4]  # 批次大小 x 动作维度
  input_name: "obs"
  output_name: "actions"

# 控制系统配置
control:
  # 控制发布频率 (Hz)
  update_rate: 100.0

  # 控制周期 (秒)
  update_period: 0.01  # 1/100.0

  # 数据超时阈值 (毫秒)
  timeout_ms: 50.0

  # 数据新鲜度阈值 (毫秒)
  max_data_age_ms: 50.0

# 动作映射配置 (神经网络输出 → PX4控制指令)
action_mapping:
  # 油门控制: [-1, 1] → [0, 1]
  throttle:
    input_range: [-1.0, 1.0]
    output_range: [0.0, 19.6]
    description: "油门指令 (0=最低推力, 1=最大推力)"

  roll_rate:
    input_range: [-1.0, 1.0]
    output_range: [-3.0, 3.0]
    description: "滚转角速度指令"

  pitch_rate:
    input_range: [-1.0, 1.0]
    output_range: [-3.0, 3.0]
    description: "俯仰角速度指令"

  yaw_rate:
    input_range: [-1.0, 1.0]
    output_range: [-3.0, 3.0]
    description: "偏航角速度指令"

# 目标位置配置
target:
  # 固定目标位置 (NED坐标系: 北-东-地)
  fixed_position: [0.0, 0.0, 1.5]  # [北向, 东向, 地下] 米
  fixed_yaw: 0.0  # 目标偏航角 (弧度)

# 输入饱和限制 (防止数值不稳定)
input_saturation:
  enabled: true

  # 线速度限制 (m/s)
  linear_velocity:
    min: -10.0
    max: 10.0

  # 重力投影限制 (归一化值)
  gravity_projection:
    min: -2.0
    max: 2.0

  # 角速度限制 (rad/s)
  angular_velocity:
    min: -20.0
    max: 20.0

  # 方向向量限制 (应该已经是[-1, 1])
  direction_vectors:
    min: -1.0
    max: 1.0

  # 目标位置向量限制 (米)
  target_position_vector:
    min: -10.0
    max: 10.0

  # 动作限制 (应该已经是[-1, 1])
  actions:
    min: -1.0
    max: 1.0


# 调试配置
debug:
  # 是否启用调试模式
  enabled: false
  # 是否打印详细状态信息
  verbose_logging: false
  # 是否发布调试话题
  debug_topics: false
  # 统计信息发布间隔 (秒)
  stats_interval: 5.0

# 安全配置
safety:
  # 最小/最大油门限制
  throttle_limits: [0.0, 1.0]

  # 角速度限制 (rad/s)
  angular_rate_limits:
    roll: [-10.0, 10.0]
    pitch: [-10.0, 10.0]
    yaw: [-5.0, 5.0]

  # 启用故障检测
  enable_failure_detection: true

  # 通信超时自动停止
  auto_stop_on_timeout: true

# 质量配置
quality_of_service:
  # 话题QoS设置
  odometry_qos:
    reliability: "BEST_EFFORT"
    durability: "VOLATILE"
    depth: 10

  control_qos:
    reliability: "RELIABLE"
    durability: "VOLATILE"
    depth: 1