# Neural Position Control Configuration
# All parameters controlled by this single YAML file

# Node configuration
node:
  name: "neural_pos_ctrl_node"
  setpoint_topic: "/neural/control"
  odometry_topic: "/fmu/out/vehicle_odometry"

# Model configuration
model:
  path: "${oc.env:INFER_WORKSPACE}/src/neural_manager/neural_pos_ctrl/models/policy_latest.onnx"

  # Executor type: "gru" or "mlp"
  executor_type: "mlp"

  # GRU specific parameters (only used when executor_type="gru")
  hidden_dim: 64
  num_layers: 1

  # Expected input/output shapes for validation
  expected_shapes:
    gru:
      input: [1, 20]
      output: [1, 4]
    mlp:
      input: [1, 20]
      output: [1, 4]

  # ONNX runtime settings
  inference:
    providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
    validate_shapes: true
    output_clipping:
      enabled: true
      min: -1.0
      max: 1.0

# Control system
control:
  # Timing
  update_rate: 100.0 # Hz
  update_period: 0.01 # seconds
  timeout_ms: 50.0

  # Action mapping
  thrust_acc: 9.8 # m/s^2
  max_roll_pitch_rate: 1.0 # rad/s
  max_yaw_rate: 1.0 # rad/s

  # Input limits
  input_saturation:
    enabled: true
    linear_velocity: [-5.0, 5.0] # m/s
    angular_velocity: [-1.5, 1.5] # rad/s
    target_position: [-5.0, 5.0] # m
    actions: [-1.0, 1.0] # normalized

target:
  position: [0.0, 0.0, -5.0] # NED coordinates [North, East, Down] meters
  yaw: 0.0 # radians

# Safety limits
safety:
  enable_failure_detection: true
  auto_stop_on_timeout: true

# Debug settings
debug:
  enabled: false
  verbose_logging: false
  measure_inference_time: true
  print_observation: true
  print_control: true
  acc_fixed: false
