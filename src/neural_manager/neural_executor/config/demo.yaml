# Enhanced Neural Demo Configuration
# This file defines target waypoints and failsafe parameters for the demo

demo_targets:
  # Waypoints in body frame [x, y, z] (meters)
  # x: forward, y: right, z: down (negative = up)
  waypoints:
    # Simple square pattern
    - [10.0, 0.0, -2.0]   # WP1: Forward 10m, altitude 2m
    - [10.0, 10.0, -2.0]   # WP2: Right 10m
    - [0.0, 10.0, -2.0]   # WP3: Back 10m
    - [0.0, 0.0, -2.0]   # WP4: Back to start position

failsafe_config:
  # Position timeout in seconds - if no position data for this long, fail
  position_timeout: 1.0

  # RC timeout in seconds - if no RC input for this long, fail
  rc_timeout: 0.5

  # Target tolerance in meters - distance to consider waypoint reached
  target_tolerance: 0.5

  # Still wait time in seconds - minimum time to wait for vehicle to be still before landing
  still_wait_time: 5.0

  # Maximum velocity in m/s - safety limit for trajectory generation
  max_velocity: 8.0

  # Target timeout in seconds - if no target data received for this long, fail
  target_timeout: 2.0

# Neural control parameters
neural_control:
  # Control mode selection
  # - "rates_throttle": Use VehicleRatesSetpoint (throttle + body rates) - recommended for multicopters
  # - "rates_acc": Use VehicleThrustAccSetpoint (thrust acceleration + body rates) - alternative mode
  control_mode: "rates_throttle"

  # Publish rate for fake network node (Hz)
  publish_rate: 10.0

  # Enable verbose logging
  debug_output: true