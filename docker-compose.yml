
services:
  # QGroundControl Dependencies Base Image
  qgc-deps:
    build:
      context: .
      dockerfile: dockerfiles/qgc-deps.dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
    image: qgc-deps:jammy

  # QGroundControl - Ground Control Station
  qgc:
    build:
      context: .
      dockerfile: dockerfiles/qgc5.dockerfile
      additional_contexts:
        qgc_deps: service:qgc-deps
      args:
        QGC_VERSION: ${QGC_VERSION:-5.0.8}
    image: qgc5-vtol:latest
    depends_on:
      ros2:
        condition: service_started

    restart: no
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
    volumes:
      - ${HOME}/.Xauthority:/home/qgc/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOME}/sim2sim:/home/qgc/ulgs/
      - /dev/input:/dev/input
    command: qgc
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ROS2 Workspace - Neural control and inference
  ros2:
    build:
      context: .
      dockerfile: dockerfiles/ros2.dockerfile
      args:
        LATETST: "true"
    image: ros2-vtol:latest

    restart: no
    privileged: true
    working_dir: /home/ros/ros2_ws
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - ROS_DISTRO=humble
      - INFER_WORKSPACE=/home/ros/ros2_ws
    volumes:
      - ${HOME}/.Xauthority:/home/ros/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: bash
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # PX4 Dependencies Base Image
  px4-deps:
    build:
      context: .
      dockerfile: dockerfiles/px4-deps.dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
    image: px4-deps:jammy-harmonic

  # PX4 Gazebo Simulator
  px4:
    build:
      context: .
      dockerfile: dockerfiles/px4-gazebo.dockerfile
      additional_contexts:
        px4_deps: service:px4-deps
    image: px4-gazebo-harmonic-vtol:v1
    depends_on:
      ros2:
        condition: service_started

    restart: no
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
    volumes:
      - ${HOME}/.Xauthority:/root/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
    command: runsim.sh 2
    stdin_open: true
    tty: true
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Log Streamer - FastAPI SSE log streaming service
  log_streamer:
    build:
      context: .
      dockerfile: dockerfiles/log-streamer.dockerfile
    image: log-streamer:latest
    restart: unless-stopped
    network_mode: host
    # Mount host journal for user service logs
    volumes:
      - /run/log/journal:/run/log/journal:ro
      - /var/log/journal:/var/log/journal:ro
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
