
services:
  # QGroundControl Dependencies Base Image
  qgc-deps:
    build:
      context: .
      dockerfile: dockerfiles/qgc-deps.dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
    image: qgc-deps:jammy

  # QGroundControl - Ground Control Station
  qgc:
    build:
      context: .
      dockerfile: dockerfiles/qgc5.dockerfile
      additional_contexts:
        qgc_deps: service:qgc-deps
      args:
        QGC_VERSION: ${QGC_VERSION:-5.0.8}
    image: qgc5-vtol:latest
    depends_on:
      bht:
        condition: service_started

    restart: no
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
    volumes:
      - ${HOME}/.Xauthority:/home/qgc/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOME}/sim2sim:/home/qgc/ulgs/
      - /dev/input:/dev/input
    command: qgc
    ipc: host
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

   # BHT Workspace - Neural control and inference
   bht:
    build:
      context: .
      dockerfile: dockerfiles/bht.dockerfile
      args:
        LATETST: "true"
    image: bht-vtol:latest

    restart: no
    privileged: true
    working_dir: /home/ros/ros2_ws
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - ROS_DISTRO=humble
    volumes:
      - ${HOME}/.Xauthority:/home/ros/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: bash
    ipc: host
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # PX4 Dependencies Base Image
  px4-deps:
    build:
      context: .
      dockerfile: dockerfiles/px4-deps.dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
    image: px4-deps:jammy-harmonic

  # PX4 Gazebo Simulator
  px4:
    build:
      context: .
      dockerfile: dockerfiles/px4-gazebo.dockerfile
      additional_contexts:
        px4_deps: service:px4-deps
    image: px4-gazebo-harmonic-vtol:v1
    depends_on:
      bht:
        condition: service_started

    restart: no
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOME}/.Xauthority:/tmp/.docker.xauth:ro
    ipc: host
    command: runsim.sh 2
    stdin_open: true
    tty: true
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


