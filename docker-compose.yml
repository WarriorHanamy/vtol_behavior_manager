
services:
  # QGroundControl - Ground Control Station
  qgc:
    build:
      context: .
      dockerfile: dockerfiles/qgc5.dockerfile
    image: qgc5-vtol:latest
    depends_on:
      ros2:
        condition: service_started

    restart: no
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
    volumes:
      - ${HOME}/.Xauthority:/home/qgc/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOME}/sim2sim:/home/qgc/ulgs/
      - /dev/input:/dev/input
    command: qgc
    network_mode: bridge
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ROS2 Workspace - Neural control and inference
  ros2:
    build:
      context: .
      dockerfile: dockerfiles/ros2.dockerfile
      args:
        LATETST: "true"
    image: ros2-vtol:latest

    restart: no
    privileged: true
    working_dir: /home/ros/ros2_ws
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - ROS_DISTRO=humble
      - INFER_WORKSPACE=/home/ros/ros2_ws
    volumes:
      - ${HOME}/.Xauthority:/home/ros/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: bash
    network_mode: bridge
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # PX4 Dependencies Base Image
  px4-deps:
    build:
      context: .
      dockerfile: dockerfiles/px4-deps.dockerfile
    image: px4-deps:jammy-harmonic

  # PX4 Gazebo Simulator
  px4:
    build:
      context: .
      dockerfile: dockerfiles/px4-gazebo.dockerfile
    image: px4-gazebo-harmonic-vtol:v1
    depends_on:
      ros2:
        condition: service_started

    restart: no
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
    volumes:
      - ${HOME}/.Xauthority:/root/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
    command: runsim.sh 2
    stdin_open: true
    tty: true
    network_mode: bridge
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
